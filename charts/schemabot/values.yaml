# SchemaBot Helm Chart — Default Values
#
# Override these for your deployment. See docs/configuration.md for the
# full config file reference.

replicaCount: 1

image:
  repository: ghcr.io/block/schemabot
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}

service:
  type: ClusterIP
  port: 8080
  annotations: {}

# Optional gRPC port for data plane (Tern) deployments.
# When set, the container exposes this port and the Service routes to it.
grpc:
  enabled: false
  port: 13370

# SchemaBot config file contents. Rendered into a ConfigMap and mounted
# at /config/config.yaml. See docs/configuration.md for all options.
#
# Example (local mode, embedded Tern):
#   config:
#     storage:
#       dsn: "env:MYSQL_DSN"
#     databases:
#       myapp:
#         type: mysql
#         environments:
#           staging:
#             dsn: "root:pass@tcp(mysql-staging:3306)/myapp"
#
# Example (gRPC mode, remote Tern):
#   config:
#     storage:
#       dsn: "secretsmanager:schemabot-db#dsn"
#     tern_deployments:
#       default:
#         staging: "tern-staging:9090"
#         production: "tern-production:9090"
#
# Example (gRPC mode, multi-deployment environment — PREVIEW):
# NOTE: multi-entry deployments maps are rejected at config load until the
# plan/apply orchestration path is wired through ResolveDatabaseTargets.
# A single-entry deployments map is accepted and behaves identically to the
# scalar target / deployment shape.
#   config:
#     storage:
#       dsn: "secretsmanager:schemabot-db#dsn"
#     databases:
#       payments:
#         type: mysql
#         environments:
#           production:
#             deployments:
#               payments-a: { target: "payments" }
#               payments-b: { target: "payments" }
#               payments-c: { target: "payments" }
#     tern_deployments:
#       payments-a:
#         production: "tern-payments-a:9090"
#       payments-b:
#         production: "tern-payments-b:9090"
#       payments-c:
#         production: "tern-payments-c:9090"
#
# Example (multi-App routing — PREVIEW):
# NOTE: configs that set apps: are rejected at config load until the
# webhook runtime is wired to dispatch by App. The shape below is the
# intended one so chart authors can prepare values without surprises
# when the hard-block lifts in the follow-up PR.
#   config:
#     storage:
#       dsn: "env:MYSQL_DSN"
#     apps:
#       app-a:
#         app-id: "env:APP_A_ID"
#         private-key: "file:/secrets/app-a/private-key"
#         webhook-secret: "file:/secrets/app-a/webhook-secret"
#       app-b:
#         app-id: "env:APP_B_ID"
#         private-key: "file:/secrets/app-b/private-key"
#         webhook-secret: "file:/secrets/app-b/webhook-secret"
#     repos:
#       org-a/repo-x:
#         github_app: app-a
#       org-b/repo-y:
#         github_app: app-b
# config is required — helm install will fail without it.
config: null

# Additional environment variables for the SchemaBot container.
# Useful for env: secret references in the config file.
env: []
  # - name: MYSQL_DSN
  #   value: "root:pass@tcp(mysql:3306)/schemabot"
  # - name: MYSQL_DSN
  #   valueFrom:
  #     secretKeyRef:
  #       name: schemabot-db
  #       key: dsn

# Additional volume mounts (e.g., for file: secret references).
extraVolumeMounts: []
  # - name: github-app-secrets
  #   mountPath: /secrets/github-app
  #   readOnly: true

# Additional volumes.
extraVolumes: []
  # - name: github-app-secrets
  #   secret:
  #     secretName: schemabot-github-app

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

# Pod annotations (e.g., Istio sidecar config).
podAnnotations: {}

# Pod labels (e.g., Datadog unified service tagging).
podLabels: {}

# Node selector, tolerations, affinity.
nodeSelector: {}
tolerations: []
affinity: {}
