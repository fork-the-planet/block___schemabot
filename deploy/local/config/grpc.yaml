# SchemaBot Configuration (gRPC Mode - SchemaBot server)
#
# SchemaBot reads databases to resolve the server-side target/deployment for
# each database/environment, then uses tern_deployments to find that deployment's
# gRPC endpoint.
#
# Deployment patterns:
#   1. Separate Tern per environment (strict isolation):
#      staging: "tern-staging:9090"
#      production: "tern-production:9090"
#
#   2. Single Tern for all environments (downward trust):
#      staging: "tern:9090"
#      production: "tern:9090"
#      (Production Tern can manage staging databases too)

# SchemaBot's own storage database
storage:
  dsn: "env:MYSQL_DSN"

# gRPC mode: separate Tern services per environment
# Change both to the same address for single-Tern deployment
tern_deployments:
  default:
    staging: "tern-staging:9090"
    production: "tern-production:9090"

# Database routes. The Tern services keep the direct target DSNs in their own
# config.
databases:
  testapp:
    type: mysql
    environments:
      staging:
        target: testapp
        deployment: default
      production:
        target: testapp
        deployment: default
