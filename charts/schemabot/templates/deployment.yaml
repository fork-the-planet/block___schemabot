apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schemabot.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "schemabot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "schemabot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Restart pods when config changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "schemabot.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "schemabot.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: schemabot
          securityContext:
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            {{- if .Values.grpc.enabled }}
            - name: grpc
              containerPort: {{ .Values.grpc.port }}
              protocol: TCP
            {{- end }}
          env:
            - name: PORT
              value: "8080"
            {{- if .Values.grpc.enabled }}
            - name: GRPC_PORT
              value: {{ .Values.grpc.port | quote }}
            {{- end }}
            - name: SCHEMABOT_CONFIG_FILE
              value: /config/config.yaml
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          # Startup gates liveness until the server finishes boot (schema
          # ensure + listeners), allowing a slow start — e.g. waiting out a
          # storage credential rotation — without liveness killing the pod.
          # The budget must comfortably exceed the server's storage boot
          # bounds (the boot retry budget plus a final attempt running to the
          # schema-ensure timeout: cross-pod advisory lock wait plus the
          # online DDL timeout), so a boot that is legitimately waiting on
          # storage or applying storage DDL is never killed mid-apply.
          startupProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 180
          # Liveness is process-only (/livez): it restarts the pod for faults a
          # restart can fix (wedged process), never for dependency outages. A
          # storage outage keeps pods alive so in-flight schema changes continue
          # and the pool reconnects in place.
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          # Readiness is dependency-aware (/health pings storage): an instance
          # that cannot reach storage is pulled from the Service until it
          # recovers, without being restarted.
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "schemabot.fullname" . }}-config
        - name: tmp
          emptyDir: {}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
