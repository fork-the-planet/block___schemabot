# Control plane Helm values for k8s e2e tests.
#
# SchemaBot with GRPCClient — routes plan/apply to the data plane over gRPC.
# The database registry owns the server-side target/deployment route. The data
# plane still owns the direct target DSN.

image:
  repository: schemabot
  tag: test
  pullPolicy: Never

config:
  storage:
    dsn: "env:MYSQL_DSN"
  databases:
    testapp:
      type: mysql
      environments:
        staging:
          # target is opaque metadata for the selected data-plane Tern service.
          # The Spirit fixture still gets its database connection from the
          # data-plane DSN; this value is the route metadata stored with the plan.
          target: testapp
          # deployment selects which gRPC data plane receives the request.
          deployment: data-plane
  tern_deployments:
    data-plane:
      staging: "data-plane-schemabot:13370"

env:
  - name: MYSQL_DSN
    value: "root:testpassword@tcp(mysql-control-plane:3306)/schemabot?parseTime=true&multiStatements=true"
  - name: LOG_LEVEL
    value: "debug"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
