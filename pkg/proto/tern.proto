syntax = "proto3";

package tern.v1;

import "google/api/annotations.proto";

option go_package = "github.com/block/schemabot/pkg/proto/ternv1";

// Tern provides schema change planning and execution.
//
// NOTE: require_unimplemented_servers=false is set in buf.gen.yaml.
// Embedding UnimplementedTernServer is optional. We recommend implementing
// all RPCs explicitly so that adding a new RPC causes a compile error
// rather than silently returning "unimplemented".
//
// Lifecycle: Plan -> Apply -> [Progress] -> [Cutover] -> [Revert|SkipRevert]
// Control:   Stop, Start, Volume (can be called during Apply execution)
//
// State machine (per apply):
//   pending -> running -> waiting_for_cutover -> cutting_over -> completed
//                |                                                  |
//                v                                            revert_window -> reverted
//              failed                                               |
//                ^                                                  v
//              stopped -(Start)-> running                       completed
//
// Only one active schema change per database at a time (enforced by Apply).
service Tern {
  // PullSchema fetches the live schema for a database route and returns it as
  // declarative schema files. It does not modify the database.
  rpc PullSchema(PullSchemaRequest) returns (PullSchemaResponse) {
    option (google.api.http) = {
      post: "/v1/pull-schema"
      body: "*"
    };
  }

  // Plan generates a schema change plan by diffing declarative schema files
  // against the live database schema. Returns DDL statements needed to converge.
  //
  // This is a stateless operation — it does not modify the database.
  // The returned plan_id is used to invoke Apply.
  //
  // The response includes:
  //   - DDL changes per table (CREATE/ALTER/DROP)
  //   - Unsafe change detection (DROP TABLE, DROP COLUMN, etc.)
  //   - Schema lint warnings
  //   - Errors (e.g., invalid SQL syntax)
  //
  // Errors are returned in the response body (not as RPC errors) so the caller
  // can display them to the user.
  rpc Plan(PlanRequest) returns (PlanResponse) {
    option (google.api.http) = {
      post: "/v1/plan"
      body: "*"
    };
  }

  // PlanDiff computes a deployment's desired-vs-live diff without persisting a
  // plan. It is the read-only producer for review-time drift detection: the
  // control plane runs it against every deployment of a database and compares
  // the results to surface a deployment that diverges from the reviewed plan.
  //
  // Unlike Plan, PlanDiff does not create a stored plan record and returns no
  // plan_id — its result is intentionally not applyable. It is idempotent and
  // safe to retry.
  rpc PlanDiff(PlanRequest) returns (PlanDiffResponse) {
    option (google.api.http) = {
      post: "/v1/plan-diff"
      body: "*"
    };
  }

  // Apply executes a previously generated plan. Returns immediately with an
  // apply_id; execution happens asynchronously. Use Progress to track status.
  //
  // Preconditions:
  //   - Plan must exist (referenced by plan_id).
  //   - No other active schema change for this database (returns accepted=false).
  //
  // Options:
  //   - defer_cutover: If true, pauses at waiting_for_cutover state until
  //     the Cutover RPC is called. If false (default), cutover is automatic.
  //   - allow_unsafe: If true, permits DROP TABLE/COLUMN operations.
  //
  // Execution modes:
  //   - Sequential (default): Each DDL runs independently — copy, cutover, next.
  //     Failure in one DDL cancels remaining DDLs.
  //   - Atomic (defer_cutover=true): All DDLs copy in parallel, then cut over
  //     together. Use for cross-table consistency.
  //
  // Creates Apply and Task records in storage for lifecycle tracking.
  rpc Apply(ApplyRequest) returns (ApplyResponse) {
    option (google.api.http) = {
      post: "/v1/apply"
      body: "*"
    };
  }

  // Progress returns detailed progress for an active or recently completed
  // schema change. Read-only — does not modify state.
  //
  // Returns per-table progress including rows copied, ETA, percent complete,
  // and a human-readable summary. For Vitess, includes per-shard progress.
  //
  // The overall state is derived from task priority:
  //   running > waiting_for_cutover > cutting_over > pending > stopped > failed > completed
  //
  // Unknown apply IDs return NOT_FOUND.
  rpc Progress(ProgressRequest) returns (ProgressResponse) {
    option (google.api.http) = {
      post: "/v1/progress"
      body: "*"
    };
  }

  // Cutover triggers the table swap phase for a schema change that was started
  // with defer_cutover=true. Only valid when state is waiting_for_cutover.
  //
  // In atomic mode, all tables cut over together. In sequential mode, the
  // current table cuts over (subsequent tables proceed automatically).
  //
  // No-op if defer_cutover was not used (cutover happens automatically).
  rpc Cutover(CutoverRequest) returns (CutoverResponse) {
    option (google.api.http) = {
      post: "/v1/cutover"
      body: "*"
    };
  }

  // Revert rolls back a completed schema change to the original schema.
  // Only valid during the revert window (state = revert_window).
  //
  // Transitions: revert_window -> reverted.
  //
  // After the revert window expires, the schema change is finalized and
  // can no longer be reverted.
  rpc Revert(RevertRequest) returns (RevertResponse) {
    option (google.api.http) = {
      post: "/v1/revert"
      body: "*"
    };
  }

  // SkipRevert closes the revert window early and finalizes the schema change.
  // Only valid when state is revert_window.
  //
  // Transitions: revert_window -> completed.
  //
  // Call this when you are confident the schema change is correct and want to
  // skip the monitoring period.
  rpc SkipRevert(SkipRevertRequest) returns (SkipRevertResponse) {
    option (google.api.http) = {
      post: "/v1/skip-revert"
      body: "*"
    };
  }

  // Health checks service health by verifying storage connectivity.
  rpc Health(HealthRequest) returns (HealthResponse) {
    option (google.api.http) = {
      get: "/v1/health"
    };
  }

  // Stop pauses all non-terminal tasks for a schema change.
  //
  // Transitions: any non-terminal state -> stopped.
  //
  // For MySQL (Spirit engine): The user has limited time to resume based on
  // binlog retention (default 7 days). After that, the checkpoint expires
  // and the schema change cannot be resumed.
  //
  // Returns stopped_count and skipped_count to indicate how many tasks
  // were affected.
  rpc Stop(StopRequest) returns (StopResponse) {
    option (google.api.http) = {
      post: "/v1/stop"
      body: "*"
    };
  }

  // Cancel terminates a schema change permanently.
  //
  // Transitions: any non-terminal state -> cancelled.
  //
  // For engines where stop is already permanent, cancel uses the same engine
  // control operation and records the final state as cancelled.
  rpc Cancel(CancelRequest) returns (CancelResponse) {
    option (google.api.http) = {
      post: "/v1/cancel"
      body: "*"
    };
  }

  // Start resumes a previously stopped schema change from its checkpoint.
  //
  // Transitions: stopped -> running.
  //
  // Preconditions:
  //   - At least one stopped task must exist for the database.
  //   - For MySQL: binlog must not have expired (default 7 day window).
  //
  // Execution resumes asynchronously (same as Apply). Use Progress to track.
  rpc Start(StartRequest) returns (StartResponse) {
    option (google.api.http) = {
      post: "/v1/start"
      body: "*"
    };
  }

  // Volume adjusts the schema change speed/concurrency while running.
  //
  // Scale: 1 (conservative, minimal database load) to 11 (aggressive, maximum
  // throughput). Affects chunk size, lock hold time, and throttle parameters.
  //
  // Can be called multiple times during a running schema change. The engine
  // is stopped and restarted internally to apply the new settings.
  //
  // Preconditions:
  //   - Active schema change must exist for the database.
  //   - Volume must be 1-11 inclusive.
  rpc Volume(VolumeRequest) returns (VolumeResponse) {
    option (google.api.http) = {
      post: "/v1/volume"
      body: "*"
    };
  }

}

// Engine represents the schema change engine type.
enum Engine {
  ENGINE_SPIRIT = 0;
  ENGINE_PLANETSCALE = 1;
  ENGINE_STRATA = 2;
}

// State represents the state of a schema change task.
enum State {
  STATE_NO_ACTIVE_CHANGE = 0;
  STATE_PENDING = 1;
  STATE_RUNNING = 2;
  STATE_WAITING_FOR_CUTOVER = 3;
  STATE_CUTTING_OVER = 4;
  STATE_REVERT_WINDOW = 5;
  STATE_COMPLETED = 6;
  STATE_FAILED = 7;
  STATE_STOPPED = 8;
  STATE_REVERTED = 9;
  STATE_CANCELLED = 10;
  STATE_PREPARING_BRANCH = 11;
  STATE_APPLYING_BRANCH_CHANGES = 12;
  STATE_CREATING_DEPLOY_REQUEST = 13;
  STATE_WAITING_FOR_DEPLOY = 14;
  STATE_VALIDATING_DEPLOY_REQUEST = 15;
  STATE_VALIDATING_BRANCH = 16;
  STATE_RECOVERING = 17;
  // Reverting a completed change during its revert window (revert_window ->
  // reverting -> reverted). Distinct from running so a multi-minute revert is
  // not surfaced as an ordinary in-progress apply.
  STATE_REVERTING = 18;
}

// ChangeType represents the type of schema change.
enum ChangeType {
  CHANGE_TYPE_OTHER = 0;
  CHANGE_TYPE_CREATE = 1;
  CHANGE_TYPE_ALTER = 2;
  CHANGE_TYPE_DROP = 3;
  CHANGE_TYPE_VSCHEMA = 4;
}

// SchemaFiles contains the schema files for a namespace (e.g. schema name for MySQL, keyspace for Vitess).
message SchemaFiles {
  // Filename → content mapping (e.g., "users.sql" → CREATE TABLE, "vschema.json" → VSchema JSON).
  map<string, string> files = 1;
}

// PullSchemaRequest requests a live schema export for a database route.
message PullSchemaRequest {
  // Database name from server-side config.
  string database = 1;
  // Database type: "vitess" or "mysql".
  string type = 2;
  // Environment: "staging" or "production".
  string environment = 3;
  // Opaque identifier for endpoint discovery. Defaults to database if empty.
  string target = 4;
  // Optional namespace to export. For MySQL this is the schema name from SHOW DATABASES.
  string namespace = 5;
  // Controls how much structured catalog data is returned alongside canonical DDL.
  PullCatalogDetail catalog_detail = 6;
}

enum PullCatalogDetail {
  // BASIC returns only canonical DDL and engine artifacts (the bare pull): no
  // namespace_catalog or table_catalog.
  PULL_CATALOG_DETAIL_BASIC = 0;
  // DETAILED additionally returns the full structured catalog
  // (namespace_catalog and table_catalog with columns, indexes, foreign keys,
  // and engine estimates).
  PULL_CATALOG_DETAIL_DETAILED = 1;
}

// PulledNamespace contains live schema content for a namespace. It describes
// database objects rather than repository filenames so clients can choose the
// file layout they write.
message PulledNamespace {
  // Table name → canonical CREATE TABLE statement.
  map<string, string> tables = 1;
  // Optional engine-specific namespace content, such as Vitess VSchema JSON.
  map<string, string> artifacts = 2;
  // namespace_catalog and table_catalog are populated only at DETAILED catalog
  // detail; at BASIC detail they are absent.
  NamespaceCatalog namespace_catalog = 3;
  map<string, TableCatalog> table_catalog = 4;
}

message NamespaceCatalog {
  string name = 1;
  string engine = 2;
  int32 table_count = 3;
}

message TableCatalog {
  string name = 1;
  string kind = 2;
  string comment = 3;
  repeated ColumnCatalog columns = 4;
  repeated IndexCatalog indexes = 5;
  // Engine-maintained estimate of the number of rows. This is an approximation
  // the engine keeps in its catalog (information_schema for MySQL); it can be
  // stale or zero until statistics are refreshed (for example by ANALYZE TABLE)
  // and must not be treated as an exact count.
  int64 estimated_row_count = 6;
  // Engine-maintained estimate of total on-disk size in bytes, including
  // indexes. Like estimated_row_count, this is approximate and may be stale
  // until statistics are refreshed.
  int64 data_size_bytes = 7;
  // Foreign keys declared on this table.
  repeated ForeignKeyCatalog foreign_keys = 8;
}

message ColumnCatalog {
  string name = 1;
  string type = 2;
  bool nullable = 3;
  string default_value = 4;
  string comment = 5;
  // Whether the column auto-increments (MySQL AUTO_INCREMENT).
  bool auto_increment = 6;
  // Whether the column is generated/computed rather than stored directly
  // (MySQL STORED/VIRTUAL GENERATED).
  bool generated = 7;
}

message IndexCatalog {
  string name = 1;
  bool primary = 2;
  bool unique = 3;
  // Ordered index key parts. Each part may be a column name or an expression,
  // depending on the database engine.
  repeated string parts = 4;
}

// ForeignKeyCatalog describes a foreign-key relationship from one table to
// another. Field names are engine-agnostic so the same shape maps to MySQL,
// Vitess, and Postgres.
message ForeignKeyCatalog {
  // Constraint name.
  string name = 1;
  // Local columns that make up the foreign key, in key order.
  repeated string columns = 2;
  // Referenced table name.
  string referenced_table = 3;
  // Referenced columns, aligned with columns.
  repeated string referenced_columns = 4;
  // Referential action on update (for example CASCADE, RESTRICT, SET NULL).
  string on_update = 5;
  // Referential action on delete.
  string on_delete = 6;
}

// PullSchemaResponse contains live schema content grouped by namespace.
message PullSchemaResponse {
  string database = 1;
  string type = 2;
  string environment = 3;
  map<string, PulledNamespace> namespaces = 4;
  int32 table_count = 5;
}

// PlanRequest requests a schema change plan from declarative schema files.
message PlanRequest {
  // Database name (e.g., "banklin"). Used for database discovery and connection lookup.
  string database = 1;
  // Database type: "vitess" or "mysql".
  string type = 2;
  // Schema files per namespace (e.g. schema name for MySQL, keyspace for Vitess).
  map<string, SchemaFiles> schema_files = 3;
  // Source repository (e.g., "org/repo").
  string repository = 4;
  // Source pull request number.
  int32 pull_request = 5;
  // Environment: "staging" or "production".
  string environment = 6;
  reserved 7;
  // Opaque identifier for endpoint discovery (e.g., database identifier).
  // Forwarded to Tern for provider-based resolution. Defaults to database if empty.
  string target = 8;
  // PR HEAD SHA at the time schema files were discovered. Persisted on the
  // stored plan record so apply-confirm can detect the cross-delivery race
  // where HEAD advances between the plan being posted and the user clicking
  // apply-confirm. Empty for non-webhook callers (e.g. CLI plan invocations
  // without a PR context).
  string head_sha = 9;
  // Repo-relative schema directory discovered by SchemaBot from the PR.
  string schema_path = 10;
}

// TableChange represents a DDL change to a table.
message TableChange {
  string table_name = 1;
  string ddl = 2;
  ChangeType change_type = 3;
  string namespace = 4;
  // Unsafe change tracking
  bool is_unsafe = 5;
  string unsafe_reason = 6;
}

// SchemaChange is a namespace-level bundle. A PlanResponse must include at most
// one SchemaChange per namespace; original_files is captured once for that
// namespace and applies to every table/artifact change in the bundle.
message SchemaChange {
  string namespace = 1;
  repeated TableChange table_changes = 2;
  // Engine-specific annotations about the plan, such as a display diff or a
  // flag telling the engine to apply an artifact. Metadata is not a rollback
  // input; rollback uses original_files.
  map<string, string> metadata = 3;
  // Original declarative schema files captured before applying this namespace's changes.
  // Engines can include table files and non-table artifacts such as Vitess vschema.json.
  map<string, string> original_files = 4;
  // True when original_files was captured, including an intentionally empty namespace.
  bool original_files_captured = 5;
}

// LintViolation represents a schema linting violation.
// Violations with severity "error" block apply unless --allow-unsafe is passed.
message LintViolation {
  string message = 1;
  string table = 2;
  string column = 3;
  string linter = 4;
  string fix_type = 5;
  string severity = 6; // "error", "warning", or "info"
}

// ShardPlan reports a shard's own changes for a namespace. A shard is changing
// when changes is non-empty; carrying the changes (rather than a separate
// needs_change flag) means a keyspace whose shards diverge — drift, or a
// partially-applied canary rollout — is represented per shard, and the exact
// reviewed DDL is what gets applied (no plan-time/apply-time TOCTOU where a
// membership flag was saved but the DDL was not).
message ShardPlan {
  // needs_change (field 3) was removed pre-release: a shard is changing iff
  // changes is non-empty. No reserved marker — this proto has no released
  // consumers, so reusing the field number is a safe, deliberate breaking change.
  string shard = 1;
  string namespace = 2;
  repeated TableChange changes = 3;
}

// PlanResponse contains the generated schema change plan.
// Lint violations with severity "error" block apply unless --allow-unsafe.
message PlanResponse {
  string plan_id = 1;
  Engine engine = 2;
  repeated SchemaChange changes = 3;
  repeated LintViolation lint_violations = 4;
  repeated string errors = 5;
  // Per-shard membership and drift, populated for sharded engines. Empty for
  // single-endpoint engines.
  repeated ShardPlan shards = 6;
}

// PlanDiffResponse contains a deployment's desired-vs-live diff. It mirrors
// PlanResponse but omits plan_id: PlanDiff never persists a plan, so its result
// is not applyable. Used by the control plane to compare deployments at review
// time.
message PlanDiffResponse {
  Engine engine = 1;
  repeated SchemaChange changes = 2;
  repeated LintViolation lint_violations = 3;
  repeated string errors = 4;
  // Per-shard membership and drift, populated for sharded engines. Empty for
  // single-endpoint engines.
  repeated ShardPlan shards = 5;
}

// ApplyRequest requests execution of a previously generated plan.
// DDL changes are passed by the caller since clients are stateless.
message ApplyRequest {
  string plan_id = 1;
  map<string, string> options = 2;
  map<string, SchemaFiles> schema_files = 3;
  // Database name for the apply operation.
  string database = 4;
  // Database type: "vitess" or "mysql".
  string type = 5;
  // DDL changes from PlanStore (clients are stateless and don't store plans).
  repeated TableChange ddl_changes = 6;
  // Environment: "staging" or "production".
  string environment = 7;
  // Opaque identifier for endpoint discovery (e.g., database identifier).
  // Forwarded to Tern for provider-based resolution. Defaults to database if empty.
  string target = 8;
  // Caller identity (e.g., "cli:user@hostname", "webhook:repo#pr").
  string caller = 9;
  // Optional phased-apply selector for sharded engines. When empty, the apply
  // covers every shard. When set, only the named shards run in this apply.
  repeated string target_shards = 10;
  // Optional idempotency key for deduplicating dispatch. When set, the data
  // plane returns the existing apply for this key instead of creating a
  // duplicate, so a re-dispatch after a lost response does not re-run the
  // schema change. Empty preserves the non-deduplicated behavior.
  string idempotency_key = 11;
}

// ApplyResponse indicates whether the apply was accepted.
message ApplyResponse {
  bool accepted = 1;
  string error_message = 2;
  // The apply identifier for tracking this schema change.
  string apply_id = 3;
  // The apply_operation identifier for operation-scoped callers.
  string apply_operation_id = 4;
}

// ProgressRequest requests detailed progress for an active schema change.
message ProgressRequest {
  // Apply ID for the schema change to inspect.
  string apply_id = 1;
  // Environment: "staging" or "production".
  string environment = 2;
}

// ShardProgress contains progress information for a single Vitess shard.
message ShardProgress {
  string shard = 1;
  string status = 2;
  int64 rows_copied = 3;
  int64 rows_total = 4;
  int64 eta_seconds = 5;
  int32 cutover_attempts = 6;
  string last_cutover_attempt = 7;
  bool ready_to_complete = 8;
}

// TableProgress contains progress information for a single table.
message TableProgress {
  string task_id = 1;
  string namespace = 2;
  string table_name = 3;
  string ddl = 4;
  string status = 5;
  int64 rows_copied = 6;
  int64 rows_total = 7;
  int32 percent_complete = 8;
  int64 eta_seconds = 9;
  bool is_instant = 10;
  repeated ShardProgress shards = 11;
  string progress_detail = 12;
  ChangeType change_type = 13;
  // Checksum phase progress: rows verified so far and the total to verify.
  // Populated while the table is checksumming (verifying copied data), 0 otherwise.
  int64 checksum_rows_checked = 14;
  int64 checksum_rows_total = 15;
}

// ProgressResponse contains detailed progress information.
message ProgressResponse {
  string apply_id = 1;
  State state = 2;
  Engine engine = 3;
  string summary = 4;
  string error_message = 5;
  repeated TableProgress tables = 6;
  string started_at = 7;
  string completed_at = 8;
  int32 volume = 9;
  map<string, string> metadata = 10;
}

// CutoverRequest triggers the cutover phase.
message CutoverRequest {
  // Apply ID for the schema change to cut over.
  string apply_id = 1;
  // Environment: "staging" or "production".
  string environment = 2;
}

// CutoverResponse indicates whether the cutover was accepted.
message CutoverResponse {
  bool accepted = 1;
  string error_message = 2;
}

// RevertRequest reverts a completed schema change.
message RevertRequest {
  // Apply ID for the schema change to revert.
  string apply_id = 1;
  // Environment: "staging" or "production".
  string environment = 2;
}

// RevertResponse indicates whether the revert was accepted.
message RevertResponse {
  bool accepted = 1;
  string error_message = 2;
}

// SkipRevertRequest skips the revert window.
message SkipRevertRequest {
  // Apply ID for the schema change to finalize without reverting.
  string apply_id = 1;
  // Environment: "staging" or "production".
  string environment = 2;
}

// SkipRevertResponse indicates whether the skip was accepted.
message SkipRevertResponse {
  bool accepted = 1;
  string error_message = 2;
}

// HealthRequest is the health check request.
message HealthRequest {}

// HealthResponse is the health check response.
message HealthResponse {
  string status = 1;
}

// StopRequest pauses an in-progress schema change by apply ID.
message StopRequest {
  // Apply ID for the schema change to stop.
  string apply_id = 1;
  // Environment: "staging" or "production".
  string environment = 2;
}

// StopResponse indicates whether the stop was accepted.
message StopResponse {
  bool accepted = 1;
  string error_message = 2;
  // For MySQL: time remaining before binlog expires and resume becomes impossible.
  string resume_deadline = 3;
  // Number of tasks that were stopped.
  int64 stopped_count = 4;
  // Number of tasks skipped (already in terminal state).
  int64 skipped_count = 5;
}

// CancelRequest permanently cancels an in-progress schema change by apply ID.
message CancelRequest {
  // Apply ID for the schema change to cancel.
  string apply_id = 1;
  // Environment: "staging" or "production".
  string environment = 2;
}

// CancelResponse indicates whether the cancel was accepted.
message CancelResponse {
  bool accepted = 1;
  string error_message = 2;
  // Number of tasks that were cancelled.
  int64 cancelled_count = 3;
  // Number of tasks skipped (already in terminal state).
  int64 skipped_count = 4;
}

// StartRequest resumes a stopped schema change by apply ID.
message StartRequest {
  // Apply ID for the schema change to start.
  string apply_id = 1;
  // Environment: "staging" or "production".
  string environment = 2;
}

// StartResponse indicates whether the start was accepted.
message StartResponse {
  bool accepted = 1;
  string error_message = 2;
  // Number of tasks that were started.
  int64 started_count = 3;
  // Number of tasks skipped (not in stopped state).
  int64 skipped_count = 4;
}

// VolumeRequest modifies the schema change speed/concurrency.
message VolumeRequest {
  // Apply ID for the schema change to adjust.
  string apply_id = 1;
  // Environment: "staging" or "production".
  string environment = 2;
  // Volume level 1-11 (1=conservative, 11=aggressive).
  int32 volume = 3;
}

// VolumeResponse indicates whether the volume change was accepted.
message VolumeResponse {
  bool accepted = 1;
  string error_message = 2;
  // Previous volume level.
  int32 previous_volume = 3;
  // New volume level.
  int32 new_volume = 4;
}
